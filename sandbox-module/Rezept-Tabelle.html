<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Growculator — Interaktive Rezept-Tabelle</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0f0f0f;
    color: #fafafa;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: contain;
  }
  .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  /* Hide spin buttons */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  /* Marquee */
  @keyframes recipe-marquee {
    0%, 10% { transform: translateX(0); }
    90%, 100% { transform: translateX(var(--marquee-shift, -50%)); }
  }
  .recipe-marquee-run { animation: recipe-marquee 6s linear; }
  /* Scrollbar — slim for the table */
  .recipe-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
  .recipe-scroll::-webkit-scrollbar-thumb { background: #404040; border-radius: 3px; }
  .recipe-scroll::-webkit-scrollbar-track { background: transparent; }
  /* Sub-pixel border for crisp lines on dark bg */
  .hairline { box-shadow: inset 0 0 0 1px #2a2a2a; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="recipe-data.jsx"></script>
<script type="text/babel" src="recipe-popover.jsx"></script>
<script type="text/babel" src="recipe-table.jsx"></script>
<script type="text/babel" src="recipe-app.jsx"></script>
</body>
</html>
